<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0b0f" />
    <meta name="description" content="%REACT_APP_NAME% – AI-powered productivity platform." />
    <meta name="app-name" content="%REACT_APP_NAME%" />
    <title>%REACT_APP_NAME% – Productivity OS</title>
    <link rel="icon" href="%PUBLIC_URL%/favicon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0b0f;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
      }

      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(250, 189, 47, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(250, 189, 47, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridPulse 1.5s ease-in-out infinite alternate;
      }

      @keyframes gridPulse {
        from { opacity: 0.4; }
        to   { opacity: 1; }
      }

      .splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        position: relative;
        z-index: 2;
      }

      .splash-logo-wrap {
        position: relative;
        width: 110px;
        height: 110px;
      }

      .splash-ring {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #fabd2f;
        border-right-color: rgba(250, 189, 47, 0.3);
        animation: ringSpinIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                   ringSpin 1.2s linear 0.6s infinite;
        opacity: 0;
      }

      .splash-ring-2 {
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-bottom-color: rgba(250, 189, 47, 0.25);
        border-left-color: rgba(250, 189, 47, 0.1);
        animation: ringSpinIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s forwards,
                   ringSpinReverse 2s linear 0.9s infinite;
        opacity: 0;
      }

      @keyframes ringSpinIn {
        from { opacity: 0; transform: scale(0.6) rotate(0deg); }
        to   { opacity: 1; transform: scale(1) rotate(360deg); }
      }
      @keyframes ringSpin {
        to { transform: rotate(360deg); }
      }
      @keyframes ringSpinReverse {
        to { transform: rotate(-360deg); }
      }

      .splash-glow {
        position: absolute;
        inset: -30px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(250, 189, 47, 0.18) 0%, transparent 70%);
        animation: glowPulse 1s ease-in-out 0.4s infinite alternate;
        opacity: 0;
        animation-fill-mode: forwards;
      }

      @keyframes glowPulse {
        from { opacity: 0.6; transform: scale(0.95); }
        to   { opacity: 1;   transform: scale(1.08); }
      }

      .splash-logo {
        width: 110px;
        height: 110px;
        border-radius: 28px;
        object-fit: contain;
        position: relative;
        z-index: 2;
        opacity: 0;
        animation: logoIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s forwards;
        filter: drop-shadow(0 0 20px rgba(250, 189, 47, 0.5));
      }

      @keyframes logoIn {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1); }
      }

      .spark {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #fabd2f;
        opacity: 0;
      }
      .spark-1 { top: -5px;    left: 50%;   animation: sparkFly1 0.8s ease-out 0.7s  forwards; }
      .spark-2 { top: 50%;     right: -5px; animation: sparkFly2 0.8s ease-out 0.85s forwards; }
      .spark-3 { bottom: -5px; left: 30%;   animation: sparkFly3 0.8s ease-out 0.75s forwards; }
      .spark-4 { top: 20%;     left: -5px;  animation: sparkFly4 0.8s ease-out 0.9s  forwards; }

      @keyframes sparkFly1 {
        0%   { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(-15px, -30px) scale(0); }
      }
      @keyframes sparkFly2 {
        0%   { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(30px, -15px) scale(0); }
      }
      @keyframes sparkFly3 {
        0%   { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(15px, 30px) scale(0); }
      }
      @keyframes sparkFly4 {
        0%   { opacity: 1; transform: translate(0, 0) scale(1); }
        100% { opacity: 0; transform: translate(-30px, 10px) scale(0); }
      }

      .splash-name {
        font-family: 'Syne', system-ui, sans-serif;
        font-size: 2rem;
        font-weight: 800;
        color: #f0f1f5;
        letter-spacing: -0.03em;
        opacity: 0;
        animation: nameIn 0.5s ease 0.6s forwards;
      }

      .splash-name span {
        color: #fabd2f;
      }

      @keyframes nameIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .splash-tagline {
        font-family: system-ui, sans-serif;
        font-size: 0.75rem;
        color: rgba(155, 163, 184, 0.8);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        opacity: 0;
        animation: nameIn 0.5s ease 0.8s forwards;
        margin-top: -16px;
      }

      .splash-sanskrit {
        font-family: Georgia, 'Noto Serif Devanagari', serif;
        font-size: 0.85rem;
        color: rgba(250, 189, 47, 0.55);
        letter-spacing: 0.05em;
        opacity: 0;
        animation: nameIn 0.5s ease 1.1s forwards;
        margin-top: -12px;
      }

      #splash.exit {
        animation: splashExit 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      @keyframes splashExit {
        0%   {
          opacity: 1;
          clip-path: inset(0 0 0 0);
        }
        40%  {
          opacity: 1;
          clip-path: inset(0 0 0 0);
        }
        100% {
          opacity: 0;
          clip-path: inset(50% 50% 50% 50% round 50%);
          transform: scale(1.04);
        }
      }

      #splash.exit::after {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          90deg,
          transparent,
          transparent 80px,
          rgba(250, 189, 47, 0.06) 80px,
          rgba(250, 189, 47, 0.06) 81px
        );
        animation: dischargeSweep 0.6s ease forwards;
      }

      @keyframes dischargeSweep {
        from { transform: scaleX(0); transform-origin: left; opacity: 1; }
        to   { transform: scaleX(1); transform-origin: left; opacity: 0; }
      }

      #root {
        opacity: 0;
        transition: opacity 0.4s ease 0.1s;
      }
      #root.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo-wrap">
          <div class="splash-glow"></div>
          <div class="splash-ring"></div>
          <div class="splash-ring-2"></div>
          <img src="/favicon.png" alt="App Logo" class="splash-logo" />
          <div class="spark spark-1"></div>
          <div class="spark spark-2"></div>
          <div class="spark spark-3"></div>
          <div class="spark spark-4"></div>
        </div>
        <div class="splash-name" id="splash-name"></div>
        <div class="splash-tagline">Productivity OS</div>
        <div class="splash-sanskrit" id="splash-sanskrit">श्रीकृष्णार्पणमस्तु</div>
      </div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      var appName = document.querySelector('meta[name="app-name"]').content || 'VidyutDhar';

      var half   = Math.ceil(appName.length / 2);
      var first  = appName.slice(0, half);
      var second = appName.slice(half);
      document.getElementById('splash-name').innerHTML =
        '<span>' + first + '</span>' + second;

      document.title = appName + ' \u2013 Productivity OS';

      var splash = document.getElementById('splash');
      var root   = document.getElementById('root');

      setTimeout(function () {
        splash.classList.add('exit');
        setTimeout(function () { root.classList.add('visible'); }, 300);
        setTimeout(function () { splash.style.display = 'none'; }, 750);
      }, 2000);
    </script>
  </body>
</html>
